<!DOCTYPE html>
<html>

<head>
    <title>DeskHub Configuration</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>DeskHub Configuration</h1>
    <form action="/config" method="POST">
        <label>WiFi SSID:</label>
        <input type="text" name="ssid" required><br>
        <label>WiFi Password:</label>
        <input type="password" name="password"><br>
        <label>PC IP Address:</label>
        <input type="text" name="pcip" required><br>
        <label>OpenWeather API Key:</label>
        <input type="text" name="weatherkey"><br>
        <label>Longitude:</label>
        <input type="text" name="lon"><br>
        <label>Latitude:</label>
        <input type="text" name="lat"><br>
        <button type="submit">Save</button>
    </form>
</body>

</html>
